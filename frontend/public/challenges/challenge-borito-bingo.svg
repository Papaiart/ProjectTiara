<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260" role="img" aria-label="Borito Bingo kihivas">
  <rect width="400" height="260" fill="#F4ECDD"/>
  <rect x="8" y="8" width="384" height="244" fill="none" stroke="#C9A24B" stroke-width="1.5" rx="6"/>
  <!-- konyvespolc felul -->
  <g transform="translate(28,28)" stroke="#3A3632" stroke-width="2" fill="none">
    <rect x="0" y="0" width="14" height="40" rx="2" fill="#B98A8A"/>
    <rect x="16" y="6" width="12" height="34" rx="2" fill="#8AA68F"/>
    <rect x="30" y="2" width="14" height="38" rx="2" fill="#E6C878"/>
  </g>
  <!-- bingo racs kozepen -->
  <g transform="translate(150,54)">
    <rect x="0" y="0" width="150" height="150" rx="8" fill="#FBF7F0" stroke="#3A3632" stroke-width="2.5"/>
    <g stroke="#3A3632" stroke-width="2">
      <line x1="50" y1="0" x2="50" y2="150"/><line x1="100" y1="0" x2="100" y2="150"/>
      <line x1="0" y1="50" x2="150" y2="50"/><line x1="0" y1="100" x2="150" y2="100"/>
    </g>
    <rect x="6" y="6" width="38" height="38" rx="3" fill="#C9A24B" opacity="0.85"/>
    <rect x="56" y="56" width="38" height="38" rx="3" fill="#B98A8A" opacity="0.85"/>
    <rect x="106" y="106" width="38" height="38" rx="3" fill="#8AA68F" opacity="0.85"/>
    <circle cx="125" cy="25" r="11" fill="none" stroke="#C9A24B" stroke-width="3"/>
    <circle cx="25" cy="125" r="11" fill="none" stroke="#B98A8A" stroke-width="3"/>
  </g>
  <text x="32" y="200" font-family="Georgia, serif" font-size="26" fill="#3A3632">Borító</text>
  <text x="32" y="228" font-family="Georgia, serif" font-size="26" fill="#C9A24B">Bingó</text>
</svg>
