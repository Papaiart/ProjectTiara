# Nginx reverse proxy a Tiara backend ele.
# A backend a 4000-es porton fut helyben, ezt tesszuk ki HTTPS-en a vilag fele.
#
# FONTOS: a GitHub Pages HTTPS-en fut, ezert a backendnek IS HTTPS-en kell elnie,
# kulonben a bongeszo letiltja a kereseket! A HTTPS tanusitvanyt a certbot adja
# (lasd a DEPLOY.md-t).
#
# Masold ide:  /etc/nginx/sites-available/tiara
# Aktivald:    sudo ln -s /etc/nginx/sites-available/tiara /etc/nginx/sites-enabled/
#              sudo nginx -t && sudo systemctl reload nginx
# HTTPS:       sudo certbot --nginx -d api.tiara-oldalad.hu

server {
    server_name api.tiara-oldalad.hu;   # <-- ird at a sajat (al)domainedre

    client_max_body_size 8M;            # a kepfeltoltesek miatt

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
    # A certbot futtatasa utan ide kerul a 443-as (HTTPS) blokk automatikusan.
}
